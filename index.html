 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Cloning Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path fill='white' d='M6 38 L32 8 L58 38 L48 38 L32 20 L16 38 Z'/></svg>">
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: system-ui, sans-serif; background: #0d0d0d; color: #e5e5e5; }
.app { display: flex; height: 100vh; }
.sidebar { width: 260px; background: #171717; border-right: 1px solid #2a2a2a; padding: 12px; display: flex; flex-direction: column; }
.sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.logo { width: 22px; height: 22px; opacity: 0.9; }
#threadList { flex: 1; overflow-y: auto; }
.thread { padding: 10px; border-radius: 8px; cursor: pointer; background: #2a2a2a; margin-bottom: 5px; }
.add-thread { margin-top: 10px; padding: 12px; border: 1px dashed #4caf50; border-radius: 8px; text-align: center; cursor: pointer; color: #4caf50; font-weight: bold;}
.add-thread:hover { background: #2a2a2a; color: #81c784; border-color: #81c784;}
.main { flex: 1; display: flex; flex-direction: column; }
.topbar { height: 48px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; padding: 0 16px; font-weight: bold;}
.content { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; height: 100%; }
.panel { background: #171717; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; }
textarea { width: 100%; height: 150px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; color: white; padding: 10px; resize: none; overflow-y: auto; }
#outputTextDisplay { background: #111; color: #bdbdbd; cursor: not-allowed; }
button { background: #2a2a2a; border: 1px solid #3a3a3a; color: white; padding: 7px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
button:hover { background: #3a3a3a; }
.record-bar { margin-top: 10px; }
.audio-ui { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.waveform { display: flex; gap: 2px; flex: 1; }
.waveform div { width: 2px; height: 6px; background: #888; }
.waveform.playing div { animation: wave 1s infinite; }
@keyframes wave { 0%,100%{height:5px;} 50%{height:14px;} }
.bottom-section { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
.controls { display: flex; gap: 8px; flex-wrap: wrap;}
.controls button { flex: 1; min-width: 80px; text-align: center;}

/* UPLOAD MODAL STYLES */
#personaModal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
}
.modal-content { background: #171717; padding: 25px; border: 1px solid #4caf50; border-radius: 12px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
.modal-content input[type="text"] { width: 100%; padding: 10px; background: #0d0d0d; color: white; border: 1px solid #2a2a2a; border-radius: 5px; margin-bottom: 20px; }
.modal-content input[type="file"] { margin-bottom: 20px; width: 100%; color: #bdbdbd; background: #0d0d0d; padding: 10px; border-radius: 5px; border: 1px solid #2a2a2a;}
.modal-content label {font-size: 0.9em; color: #aaa; display: block; margin-bottom: 5px;}
</style>
</head>
<body>

<!-- UPLOAD POP-UP MODAL -->
<div id="personaModal">
    <div class="modal-content">
        <h3 style="margin-top:0; color: #4caf50;">+ Upload New Persona</h3>
        <label>Persona Name:</label>
        <input type="text" id="personaName" placeholder="e.g. Elon Musk">
        <label>Voice Sample (.wav format, 6-10 seconds):</label>
        <input type="file" id="personaVoice" accept=".wav">
        <label>Biography Database (.txt format):</label>
        <input type="file" id="personaBio" accept=".txt">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="submitPersona()" style="background:#2b5c2b; flex:1; font-weight: bold;">Upload & Load Agent</button>
            <button onclick="closeModal()" style="flex:1;">Cancel</button>
        </div>
    </div>
</div>

<div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <svg class="logo" viewBox="0 0 64 64" fill="white"><path d="M6 38 L32 8 L58 38 L48 38 L32 20 L16 38 Z"/></svg>
            <span>Voice Cloning Studio</span>
        </div>
        <div id="threadList"><div class="thread">Active Agent</div></div>
        <div class="add-thread" onclick="openModal()">+ Add Person</div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="topbar">Agent Interface</div>
        <div class="content">

            <!-- LEFT PANEL (INPUT) -->
            <div class="panel">
                <h4>Voice Input</h4>
                <textarea id="inputText" placeholder="Click 'Record' to speak, or type your question here..."></textarea>
                <div class="record-bar"><button id="recordToggle">Record Mic</button></div>
                <div class="audio-ui">
                    <button id="playInput">▶</button>
                    <div class="waveform" id="waveInput"><div></div><div></div><div></div><div></div><div></div></div>
                </div>
                <audio id="inputAudio" style="display:none;"></audio>
                <div class="bottom-section">
                    <button onclick="confirmInput()" style="background: #2b5c2b; border-color: #3b7c3b; padding: 10px; font-weight: bold;">Confirm</button>
                </div>
            </div>

            <!-- RIGHT PANEL (OUTPUT) -->
            <div class="panel">
                <h4>Generated Voice</h4>
                <div class="audio-ui">
                    <button id="playOutput">▶</button>
                    <div class="waveform" id="waveOutput"><div></div><div></div><div></div><div></div><div></div></div>
                </div>
                <audio id="outputAudio" style="display:none;"></audio>
                
                <!-- CHAT LOG UI -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top:10px;">
                    <h4 style="margin: 0;">Conversation Thread</h4>
                    <button onclick="clearChat()" style="background: #8b0000; padding: 4px 8px; font-size: 0.8em;">Clear Chat</button>
                </div>
                <textarea id="outputTextDisplay" readonly placeholder="Your conversation will appear here..."></textarea>
                
                <div class="bottom-section">
                    <h4>AI Memory Feedback</h4>
                    <textarea id="feedbackText" placeholder="Enter facts here to teach the AI..."></textarea>
                    <!-- CRUD CONTROLS -->
                    <div class="controls">
                        <button onclick="insertText()" style="background:#204020;">Insert</button>
                        <button onclick="updateText()" style="background:#404020;">Update</button>
                        <button onclick="deleteText()" style="background:#402020;">Delete</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // --- UPLOAD MODAL LOGIC ---
    function openModal() { document.getElementById('personaModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('personaModal').style.display = 'none'; }

    async function submitPersona() {
        const name = document.getElementById('personaName').value;
        const voice = document.getElementById('personaVoice').files[0];
        const bio = document.getElementById('personaBio').files[0];

        if(!name || !voice || !bio) return alert("Please fill out the name and attach BOTH the .wav and .txt files.");

        const formData = new FormData();
        formData.append("name", name);
        formData.append("voice_file", voice);
        formData.append("bio_file", bio);

        document.getElementById('inputText').value = `Uploading files and generating folder for '${name}'... Please wait.`;
        closeModal();

        try {
            const res = await fetch("/api/persona", { method: "POST", body: formData });
            const data = await res.json();
            
            if (res.ok) {
                const div = document.createElement("div");
                div.className = "thread";
                div.textContent = name;
                document.getElementById("threadList").appendChild(div);
                document.getElementById('inputText').value = ` Success! You are now speaking to ${name}.\nA dedicated folder has been created for their files.`;
                document.getElementById('outputTextDisplay').value = "New persona loaded! Start a conversation.\n-----------------------------------\n";
            } else {
                alert("Error: " + data.detail);
                document.getElementById('inputText').value = " Failed to load persona.";
            }
        } catch(e) { alert("Connection error while uploading files."); }
    }

    // --- RECORD & TRANSCRIBE ---
    let rec = false, media, chunks = [];
    const btn = document.getElementById("recordToggle"), inputAudio = document.getElementById("inputAudio"), 
          inputText = document.getElementById("inputText"), outputText = document.getElementById("outputTextDisplay"), 
          outputAudio = document.getElementById("outputAudio"), waveInput = document.getElementById("waveInput"), 
          waveOutput = document.getElementById("waveOutput");

    btn.onclick = async () => {
        if (!rec) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            media = new MediaRecorder(stream);
            chunks = [];
            media.ondataavailable = e => chunks.push(e.data);
            media.onstop = async () => {
                const audioBlob = new Blob(chunks, { type: 'audio/wav' });
                inputAudio.src = URL.createObjectURL(audioBlob);
                
                inputText.value = "Transcribing audio... please wait.";
                const formData = new FormData();
                formData.append("file", audioBlob, "mic.wav");
                
                try {
                    const res = await fetch("/api/transcribe", { method: "POST", body: formData });
                    const data = await res.json();
                    inputText.value = res.ok ? data.text : " " + (data.detail || "Server Error");
                } catch (e) { inputText.value = " Error connecting to server."; }
            };
            media.start();
            rec = true;
            btn.textContent = "Stop Recording"; btn.style.background = "#8b0000";
        } else {
            media.stop();
            rec = false;
            btn.textContent = "Record Mic"; btn.style.background = "#2a2a2a";
        }
    };

    // --- PLAYBACK SYNC ---
    const playInput = document.getElementById("playInput");
    playInput.onclick = () => {
        if (inputAudio.paused && inputAudio.src) { inputAudio.play(); playInput.textContent = "||"; waveInput.classList.add("playing"); } 
        else { inputAudio.pause(); playInput.textContent = "▶"; waveInput.classList.remove("playing"); }
    };
    inputAudio.onended = () => { playInput.textContent = "▶"; waveInput.classList.remove("playing"); };

    const playOutput = document.getElementById("playOutput");
    playOutput.onclick = () => {
        if (outputAudio.paused && outputAudio.src) { outputAudio.play(); playOutput.textContent = "||"; waveOutput.classList.add("playing"); } 
        else { outputAudio.pause(); playOutput.textContent = "▶"; waveOutput.classList.remove("playing"); }
    };
    outputAudio.onended = () => { playOutput.textContent = "▶"; waveOutput.classList.remove("playing"); };

    // --- MAGIC BUTTON (LLM -> TTS) ---
    async function confirmInput() {
        const text = inputText.value;
        if (!text || text.startsWith(" ") || text.includes("Transcribing")) return alert("Please record or type a valid question.");

        outputText.value += `\n You: ${text}\n Thinking...\n`;
        outputText.scrollTop = outputText.scrollHeight;
        
        const chatForm = new FormData(); chatForm.append("text", text);
        
        try {
            const chatRes = await fetch("/api/chat", { method: "POST", body: chatForm });
            const chatData = await chatRes.json();
            
            if (!chatRes.ok) { 
                outputText.value += ` Error: ${chatData.detail || "Server failed"}\n`; 
                return; 
            }
            
            outputText.value = outputText.value.replace("Thinking...\n", "");
            outputText.value += `Person [Emotion: ${chatData.emotion}]: ${chatData.answer}\n Generating voice...\n`;
            outputText.scrollTop = outputText.scrollHeight;
            
            const ttsForm = new FormData(); ttsForm.append("text", chatData.answer);
            const ttsRes = await fetch("/api/tts", { method: "POST", body: ttsForm });
            
            if (ttsRes.ok) {
                const audioBlob = await ttsRes.blob();
                outputAudio.src = URL.createObjectURL(audioBlob);
                outputAudio.play();
                playOutput.textContent = "||";
                waveOutput.classList.add("playing");
                
                outputText.value = outputText.value.replace("Generating voice...\n", "");
                outputText.value += `-----------------------------------\n`;
                inputText.value = ""; 
            } else {
                const errorData = await ttsRes.json();
                outputText.value += `XTTS Error: ${errorData.detail || "Server failed"}\n`;
            }
        } catch (e) { outputText.value += " Error communicating with server.\n"; }
        
        outputText.scrollTop = outputText.scrollHeight;
    }

    // --- CLEAR THREAD FUNCTION ---
    async function clearChat() {
        await fetch("/api/chat/clear", { method: "POST" });
        document.getElementById('outputTextDisplay').value = "Conversation memory cleared. Start a new topic!\n-----------------------------------\n";
    }

    // --- RAG MEMORY: INSERT, UPDATE, DELETE ---
    const feedbackText = document.getElementById("feedbackText");
    
    async function insertText() {
        if (!feedbackText.value) return alert("Type the memory you want to add into the feedback box first.");
        const formData = new FormData(); formData.append("text", feedbackText.value);
        await fetch("/api/memory/insert", { method: "POST", body: formData });
        alert("Memory Inserted & Re-indexed successfully!");
        feedbackText.value = "";
    }
    
    async function updateText() {
        if (!feedbackText.value) return alert("Type the NEW updated text in the feedback box first.");
        const query = prompt("What is the OLD information you want to replace? (Type a keyword or sentence the AI already knows)");
        if (!query) return;

        const formData = new FormData(); 
        formData.append("query", query);
        formData.append("new_text", feedbackText.value);

        const res = await fetch("/api/memory/update", { method: "POST", body: formData });
        const data = await res.json();
        alert(data.status);
        feedbackText.value = "";
    }

    async function deleteText() {
        if (!feedbackText.value) return alert("Type the memory or keyword you want to delete into the feedback box.");
        const formData = new FormData(); formData.append("query", feedbackText.value);
        const res = await fetch("/api/memory/delete", { method: "POST", body: formData });
        const data = await res.json();
        alert(data.status);
        feedbackText.value = "";
    }
</script>
</body>
</html>
